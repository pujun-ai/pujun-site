<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="innerClip">
      <circle cx="50" cy="50" r="43"/>
    </clipPath>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8D8D8"/>
      <stop offset="100%" stop-color="#C8E8D8"/>
    </linearGradient>
    <!-- Rope pattern for outer border -->
    <pattern id="rope" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#C4622D"/>
      <line x1="0" y1="4" x2="8" y2="4" stroke="#A0471E" stroke-width="1.5"/>
      <line x1="4" y1="0" x2="4" y2="8" stroke="#D4724D" stroke-width="0.5"/>
    </pattern>
    <path id="topTextPath" d="M 50,50 m -38,0 a 38,38 0 1,1 76,0"/>
    <path id="bottomTextPath" d="M 50,50 m -34,0 a 34,34 0 1,0 68,0"/>
  </defs>

  <!-- Outer rope border ring -->
  <circle cx="50" cy="50" r="50" fill="#C4622D"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="#8B3A1A" stroke-width="1"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#E07040" stroke-width="0.6"/>

  <!-- Dashed rope effect -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#A0471E" stroke-width="3" stroke-dasharray="3,2"/>

  <!-- Inner dark teal border ring -->
  <circle cx="50" cy="50" r="43" fill="#1C3A38"/>
  <circle cx="50" cy="50" r="41" fill="#1C3A38" stroke="#2A5250" stroke-width="1"/>

  <!-- Scene background -->
  <circle cx="50" cy="50" r="40" fill="url(#skyGrad)" clip-path="url(#innerClip)"/>

  <!-- Sky brightening near sun -->
  <radialGradient id="sunGlow" cx="60%" cy="30%" r="30%">
    <stop offset="0%" stop-color="#FFF0A0" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#A8D8D8" stop-opacity="0"/>
  </radialGradient>
  <circle cx="50" cy="50" r="40" fill="url(#sunGlow)" clip-path="url(#innerClip)"/>

  <!-- Sun -->
  <circle cx="62" cy="25" r="5" fill="#F5C842"/>
  <line x1="62" y1="17" x2="62" y2="20" stroke="#F5C842" stroke-width="1.2"/>
  <line x1="62" y1="30" x2="62" y2="33" stroke="#F5C842" stroke-width="1.2"/>
  <line x1="54" y1="25" x2="57" y2="25" stroke="#F5C842" stroke-width="1.2"/>
  <line x1="67" y1="25" x2="70" y2="25" stroke="#F5C842" stroke-width="1.2"/>
  <line x1="56.5" y1="19.5" x2="58.5" y2="21.5" stroke="#F5C842" stroke-width="1"/>
  <line x1="65.5" y1="28.5" x2="67.5" y2="30.5" stroke="#F5C842" stroke-width="1"/>
  <line x1="56.5" y1="30.5" x2="58.5" y2="28.5" stroke="#F5C842" stroke-width="1"/>
  <line x1="65.5" y1="21.5" x2="67.5" y2="19.5" stroke="#F5C842" stroke-width="1"/>

  <!-- Mountains back -->
  <polygon points="15,65 30,32 45,65" fill="#5A8C7A" clip-path="url(#innerClip)"/>
  <polygon points="35,65 52,26 68,65" fill="#4A7C6A" clip-path="url(#innerClip)"/>
  <polygon points="52,65 67,35 82,65" fill="#5A8C7A" clip-path="url(#innerClip)"/>

  <!-- Snow caps -->
  <polygon points="47,33 52,26 57,33 54,31 50,28 46,31" fill="white" clip-path="url(#innerClip)"/>
  <polygon points="28,38 30,32 32,38 31,36 30,34 29,36" fill="white" clip-path="url(#innerClip)"/>
  <polygon points="65,41 67,35 69,41 68,39 67,37 66,39" fill="white" clip-path="url(#innerClip)"/>

  <!-- Trees -->
  <polygon points="16,65 19,56 22,65" fill="#2A5230" clip-path="url(#innerClip)"/>
  <polygon points="14,65 17,58 20,65" fill="#1E3D25" clip-path="url(#innerClip)"/>
  <polygon points="76,65 79,56 82,65" fill="#2A5230" clip-path="url(#innerClip)"/>
  <polygon points="78,65 81,58 84,65" fill="#1E3D25" clip-path="url(#innerClip)"/>

  <!-- Ground -->
  <rect x="10" y="63" width="80" height="20" fill="#5A8040" clip-path="url(#innerClip)"/>

  <!-- Road/path winding -->
  <path d="M50,83 Q52,75 56,70 Q60,65 62,58" fill="none" stroke="#D4C090" stroke-width="3" clip-path="url(#innerClip)"/>

  <!-- Compass rose (top left) -->
  <g transform="translate(20,28)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#F5E6C8" stroke-width="1.2"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#F5E6C8" stroke-width="1.2"/>
    <polygon points="0,-6 -2,-3 2,-3" fill="#F5E6C8"/>
    <polygon points="0,6 -2,3 2,3" fill="#C8B88A"/>
    <polygon points="-6,0 -3,-2 -3,2" fill="#C8B88A"/>
    <polygon points="6,0 3,-2 3,2" fill="#C8B88A"/>
    <circle cx="0" cy="0" r="1.5" fill="#F5E6C8"/>
  </g>

  <!-- Camera body -->
  <rect x="22" y="50" width="22" height="16" rx="2" fill="#8B6914"/>
  <rect x="22" y="50" width="22" height="16" rx="2" fill="none" stroke="#C09030" stroke-width="0.8"/>
  <!-- Camera lens -->
  <circle cx="33" cy="58" r="6.5" fill="#1A2A3C" stroke="#C09030" stroke-width="1.5"/>
  <circle cx="33" cy="58" r="4.5" fill="#0A1520"/>
  <circle cx="33" cy="58" r="2.5" fill="#1A3050"/>
  <circle cx="31" cy="56" r="1" fill="#4A6A90" opacity="0.6"/>
  <!-- Camera top hump -->
  <rect x="28" y="47" width="9" height="4" rx="1.5" fill="#8B6914" stroke="#C09030" stroke-width="0.6"/>
  <!-- Camera viewfinder -->
  <rect x="38" y="51" width="4" height="3" rx="0.5" fill="#7A5A10"/>

  <!-- Bicycle -->
  <!-- Rear wheel -->
  <circle cx="65" cy="63" r="8" fill="none" stroke="#4A8C70" stroke-width="1.8"/>
  <circle cx="65" cy="63" r="1.5" fill="#4A8C70"/>
  <!-- Front wheel -->
  <circle cx="79" cy="63" r="8" fill="none" stroke="#4A8C70" stroke-width="1.8"/>
  <circle cx="79" cy="63" r="1.5" fill="#4A8C70"/>
  <!-- Spokes rear -->
  <line x1="65" y1="55" x2="65" y2="63" stroke="#4A8C70" stroke-width="0.8"/>
  <line x1="57" y1="63" x2="65" y2="63" stroke="#4A8C70" stroke-width="0.8"/>
  <line x1="67.5" y1="55.3" x2="65" y2="63" stroke="#4A8C70" stroke-width="0.6"/>
  <!-- Frame -->
  <line x1="65" y1="63" x2="72" y2="53" stroke="#4A8C70" stroke-width="1.8"/>
  <line x1="72" y1="53" x2="79" y2="63" stroke="#4A8C70" stroke-width="1.8"/>
  <line x1="65" y1="63" x2="72" y2="63" stroke="#4A8C70" stroke-width="1.8"/>
  <line x1="72" y1="63" x2="72" y2="53" stroke="#4A8C70" stroke-width="1.8"/>
  <!-- Handlebar -->
  <line x1="72" y1="53" x2="79" y2="50" stroke="#4A8C70" stroke-width="1.5"/>
  <line x1="77" y1="48" x2="81" y2="50" stroke="#4A8C70" stroke-width="1.5"/>
  <!-- Seat -->
  <line x1="72" y1="53" x2="68" y2="50" stroke="#4A8C70" stroke-width="1.5"/>
  <line x1="66" y1="49" x2="70" y2="49" stroke="#4A8C70" stroke-width="2"/>

  <!-- Coffee cup (center bottom) -->
  <path d="M43,73 L44,80 L56,80 L57,73 Z" fill="#F5E6C8" stroke="#C09030" stroke-width="0.8"/>
  <path d="M43.5,74 L56.5,74" stroke="#E8D4A0" stroke-width="1"/>
  <!-- Cup handle -->
  <path d="M57,75 Q62,75 62,77 Q62,79 57,79" fill="none" stroke="#C09030" stroke-width="1"/>
  <!-- Saucer -->
  <ellipse cx="50" cy="80.5" rx="8" ry="1.5" fill="#E8D4A0"/>
  <!-- Steam wisps -->
  <path d="M47,72 Q46,69 47,67" fill="none" stroke="#BBBBBB" stroke-width="1" opacity="0.7"/>
  <path d="M50,72 Q49,68 50,65" fill="none" stroke="#BBBBBB" stroke-width="1" opacity="0.7"/>
  <path d="M53,72 Q54,69 53,67" fill="none" stroke="#BBBBBB" stroke-width="1" opacity="0.7"/>

  <!-- Top curved text: "THE WANDERING SNAP & SIP" -->
  <text font-family="Georgia, serif" font-size="6.5" fill="#F0E8D0" font-weight="bold" letter-spacing="0.8">
    <textPath href="#topTextPath" startOffset="8%">THE WANDERING SNAP &amp; SIP</textPath>
  </text>

  <!-- Bottom curved text: "TRAVEL • PHOTOGRAPHY • CYCLING • COFFEE" -->
  <text font-family="Georgia, serif" font-size="4.5" fill="#F0E8D0" letter-spacing="0.4">
    <textPath href="#bottomTextPath" startOffset="4%">TRAVEL • PHOTOGRAPHY • CYCLING • COFFEE</textPath>
  </text>

  <!-- Bullet dots left and right of bottom text area -->
  <circle cx="18" cy="72" r="2" fill="#C4622D"/>
  <circle cx="82" cy="72" r="2" fill="#C4622D"/>
</svg>
